apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: "10s"
      httpMethod: POST

  - name: InfluxDB-k6
    type: influxdb
    uid: influxdb-k6
    access: proxy
    url: http://influxdb:8086
    database: k6
    isDefault: false
    jsonData:
      httpMode: GET

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      maxLines: 5000
      timeout: 60
