apiVersion: 1

contactPoints:
  - orgId: 1
    name: alert-service-webhook
    receivers:
      - uid: alert-service-webhook-uid
        type: webhook
        settings:
          url: http://alert-service:8080/api/alerts/webhook
          httpMethod: POST
          authorization_scheme: Bearer
          authorization_credentials: TROQUE_POR_UM_TOKEN_SEGURO
policies:
  - orgId: 1
    receiver: alert-service-webhook
    group_by: [alertname, service]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
    routes:
      - receiver: alert-service-webhook
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 15m

groups:
  - orgId: 1
    name: ecommerce-alerts
    folder: ECommerce
    interval: 30s
    rules:

      - uid: alert-service-down
        title: "Servico DOWN"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: up{job=~"customer-service|product-service|order-service|notification-service"}
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: { params: [1], type: lt }
                  query: { params: [A] }
                  reducer: { type: last }
                  operator: { type: and }
        noDataState: Alerting
        execErrState: Alerting
        for: 30s
        labels:
          severity: critical
          service: "{{ $labels.job }}"
        annotations:
          summary: "Servico {{ $labels.job }} esta DOWN"

      - uid: alert-error-rate-high
        title: "Error Rate > 5%"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: "100 * sum by (job) (rate(http_requests_received_total{code=~\"4..|5..\"}[5m])) / sum by (job) (rate(http_requests_received_total[5m]))"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: { params: [5], type: gt }
                  query: { params: [A] }
                  reducer: { type: last }
                  operator: { type: and }
        noDataState: NoData
        execErrState: Error
        for: 1m
        labels:
          severity: warning
          service: "{{ $labels.job }}"
        annotations:
          summary: "Error rate alta no {{ $labels.job }}"

      - uid: alert-rabbitmq-queue-high
        title: "Fila RabbitMQ > 500"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: rabbitmq_queue_messages_ready
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: { params: [500], type: gt }
                  query: { params: [A] }
                  reducer: { type: last }
                  operator: { type: and }
        noDataState: NoData
        execErrState: Error
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Fila {{ $labels.queue }} acumulando"

      - uid: alert-outbox-failed
        title: "Outbox com falha"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: outbox_failed_messages_total
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: { params: [0], type: gt }
                  query: { params: [A] }
                  reducer: { type: last }
                  operator: { type: and }
        noDataState: NoData
        execErrState: Error
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Outbox com falhas no {{ $labels.service }}"
