global:
  scrape_interval:     10s
  evaluation_interval: 10s

scrape_configs:
  # ── ASP.NET Core services (prometheus-net) ───────────────────────────────────
  - job_name: customer-service
    static_configs: [{ targets: [customer-service:8080] }]
    metrics_path: /metrics

  - job_name: product-service
    static_configs: [{ targets: [product-service:8080] }]
    metrics_path: /metrics

  - job_name: order-service
    static_configs: [{ targets: [order-service:8080] }]
    metrics_path: /metrics

  - job_name: notification-service
    static_configs: [{ targets: [notification-service:8080] }]
    metrics_path: /metrics

  # ── Health checks via prometheus-net ────────────────────────────────────────
  - job_name: health-checks
    metrics_path: /metrics
    params:
      path: [/health]
    static_configs:
      - targets:
          - customer-service:8080
          - product-service:8080
          - order-service:8080
          - notification-service:8080

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  - job_name: rabbitmq
    static_configs: [{ targets: [rabbitmq-exporter:9419] }]

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - job_name: redis
    static_configs: [{ targets: [redis-exporter:9121] }]

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  - job_name: postgres-customers
    static_configs: [{ targets: [postgres-exporter-customers:9187] }]

  - job_name: postgres-orders
    static_configs: [{ targets: [postgres-exporter-orders:9187] }]

  # ── Prometheus itself ────────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs: [{ targets: [localhost:9090] }]
