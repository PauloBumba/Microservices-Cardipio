# ─────────────────────────────────────────────────────────────────────────────
# Grafana Alerting — Provisioning via arquivo
# Caminho no container: /etc/grafana/provisioning/alerting/alerts.yaml
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

# ── Contact Points ────────────────────────────────────────────────────────────
contactPoints:
  - orgId: 1
    name: alert-service-webhook
    receivers:
      - uid: alert-service-webhook-uid
        type: webhook
        settings:
          url: http://alert-service:8080/api/alerts/webhook
          httpMethod: POST
          username: ""
          password: ""
          headers:
            X-Alert-Token: TROQUE_POR_UM_TOKEN_SEGURO

# ── Notification Policies ─────────────────────────────────────────────────────
policies:
  - orgId: 1
    receiver: alert-service-webhook
    group_by: [alertname, service]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
    routes:
      - receiver: alert-service-webhook
        matchers:
          - severity = critical
        group_wait: 10s        # Critical dispara mais rápido
        repeat_interval: 15m

# ── Alert Rules ───────────────────────────────────────────────────────────────
groups:
  - orgId: 1
    name: ecommerce-alerts
    folder: ECommerce
    interval: 30s
    rules:

      # ── 1. Serviço DOWN ─────────────────────────────────────────────────────
      - uid: alert-service-down
        title: "Serviço DOWN"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: up{job=~"customer-service|product-service|order-service|notification-service"}
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [1], type: lt }
                  query: { params: [A] }
                  reducer: { type: last }
        noDataState: Alerting
        execErrState: Alerting
        for: 30s
        annotations:
          summary: "Serviço {{ $labels.job }} está DOWN"
          description: "O serviço {{ $labels.job }} não está respondendo ao Prometheus. Verifique o container."
        labels:
          severity: critical
          team: devops

      # ── 2. Memória > 80% ────────────────────────────────────────────────────
      - uid: alert-memory-high
        title: "Memória Alta (> 80%)"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: |
                process_working_set_bytes{job=~"customer-service|product-service|order-service|notification-service"}
                / 
                process_virtual_memory_bytes{job=~"customer-service|product-service|order-service|notification-service"}
                * 100
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [80], type: gt }
                  query: { params: [A] }
                  reducer: { type: last }
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "Memória alta no serviço {{ $labels.job }}"
          description: "Uso de memória acima de 80% por mais de 2 minutos no {{ $labels.job }}."
        labels:
          severity: warning
          team: devops

      # ── 3. Error Rate > 5% ──────────────────────────────────────────────────
      - uid: alert-error-rate-high
        title: "Error Rate > 5%"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: |
                100 * sum by (job) (rate(http_requests_received_total{code=~"4..|5.."}[5m]))
                /
                sum by (job) (rate(http_requests_received_total[5m]))
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [5], type: gt }
                  query: { params: [A] }
                  reducer: { type: last }
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "Taxa de erro alta no {{ $labels.job }}"
          description: "Error rate acima de 5% por mais de 1 minuto no serviço {{ $labels.job }}."
        labels:
          severity: warning
          team: devops

      # ── 4. Fila RabbitMQ > 500 msgs ─────────────────────────────────────────
      - uid: alert-rabbitmq-queue-high
        title: "Fila RabbitMQ acumulando (> 500)"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: rabbitmq_queue_messages_ready
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [500], type: gt }
                  query: { params: [A] }
                  reducer: { type: last }
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "Fila {{ $labels.queue }} com mais de 500 mensagens"
          description: "A fila {{ $labels.queue }} está com {{ $values.A }} mensagens prontas há mais de 2 minutos. Possível consumidor parado."
        labels:
          severity: warning
          team: devops

      # ── 5. Outbox com falha ─────────────────────────────────────────────────
      - uid: alert-outbox-failed
        title: "Outbox com mensagens com falha"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: outbox_failed_messages_total
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [0], type: gt }
                  query: { params: [A] }
                  reducer: { type: last }
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "Outbox com falhas no {{ $labels.service }}"
          description: "Existem {{ $values.A }} mensagens no Outbox do {{ $labels.service }} que esgotaram todas as tentativas de retry."
        labels:
          severity: critical
          team: devops
