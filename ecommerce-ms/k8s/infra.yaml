# ── PostgreSQL para cada microsserviço ────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers-db
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels: { app: customers-db }
  template:
    metadata:
      labels: { app: customers-db }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_DB, value: customers_db }
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_PASSWORD, value: postgres123 }
          ports: [{ containerPort: 5432 }]
          readinessProbe:
            exec: { command: [pg_isready, -U, postgres] }
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: customers-db
  namespace: ecommerce
spec:
  selector: { app: customers-db }
  ports: [{ port: 5432, targetPort: 5432 }]
---
