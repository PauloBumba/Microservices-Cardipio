apiVersion: v1
kind: ConfigMap
metadata:
  name: services-config
  namespace: ecommerce
data:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080
  RabbitMQ__Host: rabbitmq-service
  RabbitMQ__Username: rabbit
  Redis__ConnectionString: redis-service:6379
  Jaeger__Endpoint: http://jaeger-service:4317
  ProductService__BaseUrl: http://product-service:8080
