apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: ecommerce
  labels: { app: customer-service }
spec:
  replicas: 2
  selector:
    matchLabels: { app: customer-service }
  template:
    metadata:
      labels: { app: customer-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: customer-service
          image: ecommerce/customer-service:latest
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: services-config }
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef: { name: db-secrets, key: CUSTOMER_DB }
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: ecommerce
spec:
  selector: { app: customer-service }
  ports: [{ port: 8080, targetPort: 8080 }]
