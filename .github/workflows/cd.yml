name: CD

on:
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build & Test (Gate)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ecommerce-ms

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ECommerce.sln

      - name: Build
        run: dotnet build ECommerce.sln --configuration Release --no-restore

      - name: Test (gate — falha bloqueia o push)
        run: dotnet test ECommerce.sln --configuration Release --no-build --verbosity minimal

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Customer Service
        uses: docker/build-push-action@v5
        with:
          context: ecommerce-ms
          file: ecommerce-ms/src/Customer/Api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/customer-service:latest,${{ secrets.DOCKER_USERNAME }}/customer-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Product Service
        uses: docker/build-push-action@v5
        with:
          context: ecommerce-ms
          file: ecommerce-ms/src/Product/Api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/product-service:latest,${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Order Service
        uses: docker/build-push-action@v5
        with:
          context: ecommerce-ms
          file: ecommerce-ms/src/Order/Api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/order-service:latest,${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: ecommerce-ms
          file: ecommerce-ms/src/Notification/Api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/notification-service:latest,${{ secrets.DOCKER_USERNAME }}/notification-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cluster
    runs-on: ubuntu-latest
    needs: docker
    # Ainda não temos um cluster de produção real (AKS/EKS/VPS) — este job
    # documenta o passo final do CD e só vai rodar de verdade quando o
    # secret KUBE_CONFIG_B64 existir apontando para um cluster de destino.
    if: ${{ false }}  # remove esta linha quando o cluster de produção existir

    steps:
      - uses: actions/checkout@v4

      - name: Set kube context
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > $HOME/.kube/config

      - name: Deploy new images
        working-directory: ecommerce-ms
        run: |
          kubectl set image deployment/customer-service     customer-service=${{ secrets.DOCKER_USERNAME }}/customer-service:${{ github.sha }}     -n ecommerce
          kubectl set image deployment/product-service       product-service=${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }}       -n ecommerce
          kubectl set image deployment/order-service         order-service=${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }}           -n ecommerce
          kubectl set image deployment/notification-service  notification-service=${{ secrets.DOCKER_USERNAME }}/notification-service:${{ github.sha }} -n ecommerce

      - name: Wait for rollout
        working-directory: ecommerce-ms
        run: |
          kubectl rollout status deployment/customer-service    -n ecommerce
          kubectl rollout status deployment/product-service      -n ecommerce
          kubectl rollout status deployment/order-service        -n ecommerce
          kubectl rollout status deployment/notification-service -n ecommerce