name: CD

on:
  push:
    branches:
      - main

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Product Service
      run: |
        docker build \
        -t ${{ secrets.DOCKER_USERNAME }}/product-service:latest \
        -f src/Product/Api/Dockerfile .

    - name: Push Product Service
      run: |
        docker push \
        ${{ secrets.DOCKER_USERNAME }}/product-service:latest

    - name: Build Customer Service
      run: |
        docker build \
        -t ${{ secrets.DOCKER_USERNAME }}/customer-service:latest \
        -f src/Customer/Api/Dockerfile .

    - name: Push Customer Service
      run: |
        docker push \
        ${{ secrets.DOCKER_USERNAME }}/customer-service:latest