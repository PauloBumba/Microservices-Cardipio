deploy:
    name: Deploy to Cluster
    runs-on: ubuntu-latest
    needs: docker
    environment: production   # opcional: exige aprovação manual no GitHub antes de rodar

    steps:
      - uses: actions/checkout@v4

      # Exemplo genérico — troca pelo provider real quando tiver cluster
      - name: Set kube context
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > $HOME/.kube/config

      - name: Deploy new images
        working-directory: ecommerce-ms
        run: |
          kubectl set image deployment/customer-service     customer-service=${{ secrets.DOCKER_USERNAME }}/customer-service:${{ github.sha }}     -n ecommerce
          kubectl set image deployment/product-service       product-service=${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }}       -n ecommerce
          kubectl set image deployment/order-service         order-service=${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }}           -n ecommerce
          kubectl set image deployment/notification-service  notification-service=${{ secrets.DOCKER_USERNAME }}/notification-service:${{ github.sha }} -n ecommerce

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/customer-service    -n ecommerce
          kubectl rollout status deployment/product-service      -n ecommerce
          kubectl rollout status deployment/order-service        -n ecommerce
          kubectl rollout status deployment/notification-service -n ecommerce